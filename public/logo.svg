<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b8fd6"/>
      <stop offset="1" stop-color="#1f6fc0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cc242"/>
      <stop offset="1" stop-color="#2f8f3e"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe14d"/>
      <stop offset="1" stop-color="#f6a623"/>
    </linearGradient>
  </defs>

  <!-- Circular emblem icon -->
  <g transform="translate(150,150)">
    <clipPath id="circleClip">
      <circle cx="0" cy="0" r="150"/>
    </clipPath>

    <g clip-path="url(#circleClip)">
      <rect x="-160" y="-160" width="320" height="320" fill="url(#blueGrad)"/>
      <polygon points="22,-160 160,-160 160,160 -42,160" fill="url(#greenGrad)"/>
    </g>

    <!-- White plug / charging symbol -->
    <g fill="#ffffff">
      <rect x="-94" y="-48" width="66" height="14" rx="7"/>
      <rect x="-94" y="-16" width="66" height="14" rx="7"/>
      <rect x="-94" y="16"  width="66" height="14" rx="7"/>
      <rect x="28" y="-48" width="66" height="14" rx="7"/>
      <rect x="28" y="-16" width="66" height="14" rx="7"/>
      <rect x="28" y="16"  width="66" height="14" rx="7"/>
      <path d="M -34,42 L 0,104 L 34,42 L 13,42 L 0,68 L -13,42 Z"/>
    </g>

    <!-- Yellow lightning bolt -->
    <path d="M 28,-148 L -34,16 L 6,16 L -26,148 L 76,-4 L 33,-4 L 68,-148 Z"
          fill="url(#boltGrad)" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
  </g>
</svg>
