<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <!-- Solid white background, rounded for browser-tab + Android-launcher use -->
  <rect width="100" height="100" rx="18" ry="18" fill="#ffffff"/>

  <!-- Outer Samai circle -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#7777aa" stroke-width="3"/>

  <!-- Bottom-left tick -->
  <line x1="22" y1="64" x2="22" y2="72" stroke="#6666aa" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Top-right tick -->
  <line x1="78" y1="28" x2="78" y2="36" stroke="#6666aa" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Diagonal slash, behind the bolt -->
  <line x1="26" y1="70" x2="74" y2="30" stroke="#7777bb" stroke-width="3" stroke-linecap="round"/>

  <!-- Lightning bolt -->
  <polygon
    points="56,20 38,52 51,52 44,80 66,46 52,46 62,20"
    fill="#2233cc"
    stroke="#1122aa"
    stroke-width="0.5"
    stroke-linejoin="round"
  />
</svg>
